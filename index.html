<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="tuf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Instagram</title>
</head>
    <body>
        <div class="instagram-wrapper">
            <div class="instagram-phone">
                <img src="Imagens/instagram-celular.png" alt="Celular">
            </div>
            <div class="instagram-continue">
                <div class="group">
                    <img src="Imagens/instagram-logo.png" class="Instagram-logo" alt="Instagram logo">
                    <div class="profile-photo">
                        <img src="Imagens/perfil-instagram.jpg" alt="foto de perfil">
                    </div>
                    <a href="#" class="Instagram-login">Continue como Guireidelas</a>
                    <a href="#" class="Instagram-logout">Remover contas</a>
                </div>
                <div class="group">
                    <p class="not-account">Não é Guireidelas?</p>
                    <p class="not-account">
                        <span class="link-blue">Alternar contas</span>
                        ou 
                        <span class="link-blue"></span>
                    </p>
                </div>
                <div class="get-the-app">
                    <p class="get-app">Baixe o app</p>
                    <div class="download">
                        <a href="#" class="app-download"></a>
                        <a href="#" class="app-download"></a>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
